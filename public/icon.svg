<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TIMELAB">
  <!-- correa: dos verticales a cada lado del centro -->
  <g stroke="#F1ECE0" stroke-width="2.6" stroke-linecap="round" fill="none">
    <line x1="240" y1="40"  x2="240" y2="138"/>
    <line x1="272" y1="40"  x2="272" y2="138"/>
    <line x1="240" y1="306" x2="240" y2="396"/>
    <line x1="272" y1="306" x2="272" y2="396"/>
  </g>

  <!-- caja: aro con toque metálico (doble trazo sutil) -->
  <circle cx="256" cy="222" r="93" fill="none" stroke="#F1ECE0" stroke-width="6"/>
  <circle cx="256" cy="222" r="86" fill="none" stroke="#F1ECE0" stroke-width="0.7" opacity="0.55"/>

  <!-- corona en 3 en punto -->
  <rect x="350" y="216" width="7" height="12" rx="1.4" fill="#F1ECE0"/>

  <!-- 12 marcas de hora: todas estilo stick uniforme; cardinales solo
       ligeramente más gruesas (no más largas) -->
  <g stroke="#F1ECE0" stroke-linecap="round" fill="none">
    <!-- cardinales (12, 3, 6, 9) -->
    <line x1="256" y1="148" x2="256" y2="160" stroke-width="3.0"/>
    <line x1="330" y1="222" x2="318" y2="222" stroke-width="3.0"/>
    <line x1="256" y1="296" x2="256" y2="284" stroke-width="3.0"/>
    <line x1="182" y1="222" x2="194" y2="222" stroke-width="3.0"/>
    <!-- intermedias (1, 2, 4, 5, 7, 8, 10, 11) — mismo largo, ligeramente más finas -->
    <line x1="293.0" y1="158.0" x2="289.0" y2="166.4" stroke-width="2.2"/>
    <line x1="320.0" y1="185.0" x2="312.6" y2="190.0" stroke-width="2.2"/>
    <line x1="320.0" y1="259.0" x2="312.6" y2="254.0" stroke-width="2.2"/>
    <line x1="293.0" y1="286.0" x2="289.0" y2="277.6" stroke-width="2.2"/>
    <line x1="219.0" y1="286.0" x2="223.0" y2="277.6" stroke-width="2.2"/>
    <line x1="192.0" y1="259.0" x2="199.4" y2="254.0" stroke-width="2.2"/>
    <line x1="192.0" y1="185.0" x2="199.4" y2="190.0" stroke-width="2.2"/>
    <line x1="219.0" y1="158.0" x2="223.0" y2="166.4" stroke-width="2.2"/>
  </g>

  <!-- manecillas: pose ~8:10 (minutera arriba-derecha, horaria abajo-izquierda)
       formando una diagonal a través de la esfera -->
  <g stroke="#F1ECE0" stroke-linecap="round" fill="none">
    <!-- horaria: hacia las 8 (radio ≈ 38) -->
    <line x1="256" y1="222" x2="223.1" y2="241.0" stroke-width="4.4"/>
    <!-- minutera: hacia las 2 (radio ≈ 62) -->
    <line x1="256" y1="222" x2="309.7" y2="191.0" stroke-width="3.0"/>
  </g>

  <!-- pivote central -->
  <circle cx="256" cy="222" r="3.6" fill="#F1ECE0"/>

  <!-- wordmark TIMELAB -->
  <text x="256" y="450"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif"
        font-weight="200"
        font-size="56"
        letter-spacing="11">TIMELAB</text>
</svg>
