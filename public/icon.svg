<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TIMELAB">
  <defs>
    <!-- gradiente metálico vertical para la caja -->
    <linearGradient id="tl-bezel" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"  stop-color="#FBF7EC"/>
      <stop offset="50%" stop-color="#C9C2B0"/>
      <stop offset="100%" stop-color="#7C7565"/>
    </linearGradient>
    <!-- gradiente metálico para la correa (igual que la caja pero más sutil) -->
    <linearGradient id="tl-strap" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D9D2BF"/>
      <stop offset="100%" stop-color="#8C8474"/>
    </linearGradient>
  </defs>

  <!-- correa: rectángulos con fill del fondo y stroke metálico; se extienden
       dentro de la caja para que la unión sea limpia (la caja se dibuja encima) -->
  <g fill="#0A0908" stroke="url(#tl-strap)" stroke-width="2.6" stroke-linejoin="round">
    <rect x="231" y="40"  width="50" height="120" rx="2"/>
    <rect x="231" y="284" width="50" height="120" rx="2"/>
  </g>

  <!-- caja: disco con gradiente metálico (bezel) -->
  <circle cx="256" cy="222" r="94" fill="url(#tl-bezel)"/>
  <!-- dial: mismo color que el fondo -->
  <circle cx="256" cy="222" r="86" fill="#0A0908"/>
  <!-- chapter ring sutil -->
  <circle cx="256" cy="222" r="84" fill="none" stroke="#7C7565" stroke-width="0.6" opacity="0.55"/>

  <!-- corona en 3 en punto -->
  <rect x="355" y="216" width="7" height="12" rx="1.4" fill="url(#tl-bezel)"/>

  <!-- 12 marcas de hora -->
  <g stroke="#F1ECE0" stroke-linecap="round" fill="none">
    <!-- cardinales -->
    <line x1="256" y1="144" x2="256" y2="154" stroke-width="3.0"/>
    <line x1="334" y1="222" x2="324" y2="222" stroke-width="3.0"/>
    <line x1="256" y1="300" x2="256" y2="290" stroke-width="3.0"/>
    <line x1="178" y1="222" x2="188" y2="222" stroke-width="3.0"/>
    <!-- intermedias -->
    <line x1="295.0" y1="154.5" x2="290.0" y2="163.1" stroke-width="2.2"/>
    <line x1="323.5" y1="183.0" x2="314.9" y2="188.0" stroke-width="2.2"/>
    <line x1="323.5" y1="261.0" x2="314.9" y2="256.0" stroke-width="2.2"/>
    <line x1="295.0" y1="289.5" x2="290.0" y2="280.9" stroke-width="2.2"/>
    <line x1="217.0" y1="289.5" x2="222.0" y2="280.9" stroke-width="2.2"/>
    <line x1="188.5" y1="261.0" x2="197.1" y2="256.0" stroke-width="2.2"/>
    <line x1="188.5" y1="183.0" x2="197.1" y2="188.0" stroke-width="2.2"/>
    <line x1="217.0" y1="154.5" x2="222.0" y2="163.1" stroke-width="2.2"/>
  </g>

  <!-- manecillas pose ~8:10 -->
  <g stroke="#F1ECE0" stroke-linecap="round" fill="none">
    <line x1="256" y1="222" x2="219.6" y2="243.0" stroke-width="4.4"/>
    <line x1="256" y1="222" x2="311.4" y2="190.0" stroke-width="3.0"/>
  </g>

  <!-- pivote -->
  <circle cx="256" cy="222" r="3.6" fill="#F1ECE0"/>

  <!-- wordmark TIMELAB (peso 300 — algo más visible que el peso 200 anterior) -->
  <text x="256" y="450"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif"
        font-weight="300"
        font-size="56"
        letter-spacing="11">TIMELAB</text>
</svg>
