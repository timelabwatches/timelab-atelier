<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="dial" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2A2319"/>
      <stop offset="60%" stop-color="#16120E"/>
      <stop offset="100%" stop-color="#0A0908"/>
    </radialGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#B87333"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0A0908"/>
  <circle cx="256" cy="256" r="200" fill="url(#dial)" stroke="#3A2F22" stroke-width="3"/>
  <circle cx="256" cy="256" r="190" fill="none" stroke="#3A2F22" stroke-width="1" stroke-dasharray="2 10"/>
  <!-- hour markers -->
  <g fill="#E8DCC4">
    <rect x="252" y="72" width="8" height="28" rx="2"/>
    <rect x="252" y="412" width="8" height="28" rx="2"/>
    <rect x="72" y="252" width="28" height="8" rx="2"/>
    <rect x="412" y="252" width="28" height="8" rx="2"/>
  </g>
  <!-- hands -->
  <rect x="252" y="130" width="8" height="130" rx="4" fill="url(#hand)" transform="rotate(35 256 256)"/>
  <rect x="252" y="170" width="6" height="90" rx="3" fill="url(#hand)" transform="rotate(-65 256 256)"/>
  <circle cx="256" cy="256" r="10" fill="#C9A961"/>
  <circle cx="256" cy="256" r="4" fill="#0A0908"/>
  <!-- brand mark -->
  <text x="256" y="360" text-anchor="middle" fill="#C9A961" font-family="Georgia, serif" font-size="24" font-weight="300" letter-spacing="4">TIMELAB</text>
</svg>
