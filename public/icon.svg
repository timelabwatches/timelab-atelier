<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TIMELAB">
  <!-- correa: dos verticales finas a cada lado del centro -->
  <g stroke="#F1ECE0" stroke-width="2.6" stroke-linecap="round" fill="none">
    <line x1="240" y1="40"  x2="240" y2="138"/>
    <line x1="272" y1="40"  x2="272" y2="138"/>
    <line x1="240" y1="306" x2="240" y2="396"/>
    <line x1="272" y1="306" x2="272" y2="396"/>
  </g>

  <!-- caja: aro principal + chapter ring sutil + esfera -->
  <circle cx="256" cy="222" r="92" fill="none" stroke="#F1ECE0" stroke-width="5"/>
  <circle cx="256" cy="222" r="83" fill="none" stroke="#F1ECE0" stroke-width="0.9" opacity="0.45"/>

  <!-- corona en 3 en punto -->
  <rect x="349" y="216" width="7" height="12" rx="1.4" fill="#F1ECE0"/>

  <!-- marcas de hora: 4 cardinales más gruesas + 8 intermedias finas -->
  <g stroke="#F1ECE0" stroke-linecap="round" fill="none">
    <!-- cardinales: 12, 3, 6, 9 -->
    <line x1="256" y1="147" x2="256" y2="160" stroke-width="4.2"/>
    <line x1="331" y1="222" x2="318" y2="222" stroke-width="4.2"/>
    <line x1="256" y1="297" x2="256" y2="284" stroke-width="4.2"/>
    <line x1="181" y1="222" x2="194" y2="222" stroke-width="4.2"/>
    <!-- intermedias 1, 2, 4, 5, 7, 8, 10, 11 -->
    <line x1="293.5" y1="157.0" x2="288.5" y2="165.7" stroke-width="2.4"/>
    <line x1="320.9" y1="184.5" x2="312.3" y2="189.5" stroke-width="2.4"/>
    <line x1="320.9" y1="259.5" x2="312.3" y2="254.5" stroke-width="2.4"/>
    <line x1="293.5" y1="287.0" x2="288.5" y2="278.3" stroke-width="2.4"/>
    <line x1="218.5" y1="287.0" x2="223.5" y2="278.3" stroke-width="2.4"/>
    <line x1="191.1" y1="259.5" x2="199.7" y2="254.5" stroke-width="2.4"/>
    <line x1="191.1" y1="184.5" x2="199.7" y2="189.5" stroke-width="2.4"/>
    <line x1="218.5" y1="157.0" x2="223.5" y2="165.7" stroke-width="2.4"/>
  </g>

  <!-- manecillas en pose 10:10 -->
  <g stroke="#F1ECE0" stroke-linecap="round" fill="none">
    <line x1="256" y1="222" x2="217.0" y2="199.5" stroke-width="4.4"/>  <!-- hora -->
    <line x1="256" y1="222" x2="312.3" y2="189.5" stroke-width="3.0"/>  <!-- minutera -->
  </g>

  <!-- pivote central -->
  <circle cx="256" cy="222" r="3.8" fill="#F1ECE0"/>

  <!-- wordmark TIMELAB: hairline, letter-spacing amplio -->
  <text x="256" y="450"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif"
        font-weight="200"
        font-size="56"
        letter-spacing="11">TIMELAB</text>
</svg>
